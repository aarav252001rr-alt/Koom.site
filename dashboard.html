<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - koom.site</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-link"></i>
                <span>koom.site</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="#" class="active">Dashboard</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <div class="dashboard-sidebar">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <h3>Welcome back!</h3>
                <p>Link Manager</p>
            </div>
            <ul class="sidebar-menu">
                <li class="active"><i class="fas fa-link"></i> My Links</li>
                <li><i class="fas fa-chart-bar"></i> Analytics</li>
                <li><i class="fas fa-qrcode"></i> QR Codes</li>
                <li><i class="fas fa-cog"></i> Settings</li>
            </ul>
            
            <!-- Sidebar Advertisement -->
            <div class="sidebar-ad">
                <div class="ad-container">
                    <span>Ad</span>
                    <p>Upgrade to Premium</p>
                    <small>Get advanced analytics</small>
                </div>
            </div>
        </div>

        <div class="dashboard-main">
            <!-- Top Advertisement -->
            <div class="ad-banner">
                <div class="ad-container">
                    <span>Advertisement</span>
                    <div class="ad-content">
                        <i class="fas fa-chart-line"></i>
                        <p>Track your links with premium analytics - Coming Soon!</p>
                    </div>
                </div>
            </div>

            <div class="links-header">
                <h2>Your Shortened Links</h2>
                <button onclick="showCreateModal()" class="btn-primary">
                    <i class="fas fa-plus"></i> Create New Link
                </button>
            </div>

            <div id="linksContainer" class="links-grid">
                <!-- Links will be loaded here dynamically -->
                <div class="loading">Loading your links...</div>
            </div>

            <!-- QR Code Display Area -->
            <div id="qrResult" class="qr-result"></div>
        </div>
    </div>

    <!-- Create/Edit Link Modal -->
    <div id="linkModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle">Create New Link</h3>
            <input type="url" id="modalLongUrl" placeholder="Enter long URL" required>
            <input type="text" id="modalCustomAlias" placeholder="Custom alias (optional)">
            <input type="password" id="modalPassword" placeholder="Password protect (optional)">
            <button onclick="saveLink()" class="btn-primary">Save Link</button>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
