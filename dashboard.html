<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - koom.site</title>

<link rel="stylesheet" href="styles.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>

</head>

<body>

<nav class="navbar">

<div class="nav-container">

<div class="logo">
<i class="fas fa-link"></i>
<span>koom.site</span>
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a class="active">Dashboard</a>
<a href="#" onclick="logout()">Logout</a>
</div>

</div>

</nav>



<div class="dashboard">

<div class="dashboard-main">

<div class="links-header">

<h2>Your Links</h2>

<button onclick="showCreateModal()" class="btn-primary">
<i class="fas fa-plus"></i> Create Link
</button>

</div>


<div id="linksContainer" class="links-grid">

<div class="loading">
Loading links...
</div>

</div>


<div id="qrResult"></div>

</div>

</div>



<div id="linkModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h3 id="modalTitle">Create Link</h3>

<input id="modalLongUrl" placeholder="Long URL">

<input id="modalCustomAlias" placeholder="Custom Alias">

<input id="modalPassword" type="password" placeholder="Password (optional)">

<button onclick="saveLink()" class="btn-primary">
Save
</button>

</div>

</div>



<script src="dashboard.js"></script>

</body>
</html>
